version: 2

builds:
  - main: ./cmd/gumroad
    binary: gumroad
    ldflags:
      - -s -w -X github.com/antiwork/gumroad-cli/internal/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

