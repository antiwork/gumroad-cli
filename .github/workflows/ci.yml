name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - run: make test-cover
      - run: make test-race
      - run: make lint
        if: success() || failure()
  cross-platform:
    name: Cross-platform verification (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go run ./cmd/gen-man
      - run: go build ./cmd/gumroad
  live-smoke:
    name: Live API smoke
    if: ${{ github.event_name != 'pull_request' && secrets.GUMROAD_SMOKE_ACCESS_TOKEN != '' }}
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make test-smoke
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_SMOKE_ACCESS_TOKEN }}
